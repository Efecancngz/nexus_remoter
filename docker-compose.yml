version: '3.8'

services:
  frontend:
    build:
      context: .
      target: builder
    ports:
      - "3000:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_API_KEY=${VITE_API_KEY}
    command: npm run dev -- --host
    restart: always
    container_name: nexus-remoter-frontend
